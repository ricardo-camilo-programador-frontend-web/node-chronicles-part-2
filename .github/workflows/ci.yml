name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Auditoria de Seguranca
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install

      - name: Auditoria de vulnerabilidades
        shell: bash
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"

          pnpm audit --audit-level moderate 2>&1 | tee "$LOG_FILE"
          status=${PIPESTATUS[0]}

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" "$LOG_FILE" && grep -Eq "responded with 5[0-9]{2}([^0-9]|$)|error \\(5[0-9]{2}\\)" "$LOG_FILE"; then
            echo "::warning::pnpm audit falhou por erro 5xx do endpoint de auditoria da npm."
            exit 0
          fi

          exit "$status"
