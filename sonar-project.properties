# ============================================================================
# SonarQube Configuration - Node Chronicles Part 2
# Based on SGS_WEB_DEVELOPER_DEV reference implementation
# ============================================================================
sonar.projectKey=node-chronicles-part-2
sonar.projectName=Node Chronicles Part 2
sonar.projectVersion=0.0.0
sonar.sources=.
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**,*.tsbuildinfo,**/*.d.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**

# Coverage (if available)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
